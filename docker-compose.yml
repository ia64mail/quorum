x-shared-env: &shared-env
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5-20250929}
  ANTHROPIC_MAX_TOKENS: ${ANTHROPIC_MAX_TOKENS:-4096}
  MCP_SERVER_URL: http://mcp-server:3000
  MCP_REQUEST_TIMEOUT_MS: ${MCP_REQUEST_TIMEOUT_MS:-1800000}
  LOG_JSON_DIR: /app/logs
  LOG_LEVEL: ${LOG_LEVEL:-log}
  npm_config_cache: /tmp/.npm
  GIT_AUTHOR_NAME: Quorum Agent
  GIT_AUTHOR_EMAIL: quorum-agent@noreply.local
  GIT_COMMITTER_NAME: Quorum Agent
  GIT_COMMITTER_EMAIL: quorum-agent@noreply.local

x-agent-security: &agent-security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp:size=512m,uid=${HOST_UID:-1000},gid=${HOST_GID:-1000}
    - /home/quorum/.claude:size=256m,uid=${HOST_UID:-1000},gid=${HOST_GID:-1000}
    - /home/quorum/.config:size=64m,uid=${HOST_UID:-1000},gid=${HOST_GID:-1000}
    - /home/quorum/.local:size=64m,uid=${HOST_UID:-1000},gid=${HOST_GID:-1000}
    - /home/quorum/.cache:size=128m,uid=${HOST_UID:-1000},gid=${HOST_GID:-1000}

services:
  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: default
      args:
        APP_NAME: mcp-server
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    ports:
      - "3000:3000"
    environment:
      <<: *shared-env
      APP_NAME: mcp-server
      PORT: 3000
      ENABLE_TEST_ENDPOINTS: "true"
      MCP_WORKSPACE_DIR: /mnt/quorum/workspace
    volumes:
      - ./logs:/app/logs
      - ${WORKSPACE_PATH:-.}:/mnt/quorum/workspace:rw
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - quorum-net

  terminal:
    build:
      context: .
      dockerfile: Dockerfile
      target: default
      args:
        APP_NAME: terminal
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    stdin_open: true
    tty: true
    depends_on:
      mcp-server:
        condition: service_healthy
    environment:
      <<: *shared-env
      APP_NAME: terminal
      PORT: 3001
      LOG_LEVEL: warn
      MCP_CALLBACK_URL: http://terminal:3001
      TERMINAL_WORKSPACE_DIR: /mnt/quorum/workspace
    volumes:
      - ${WORKSPACE_PATH:-.}:/mnt/quorum/workspace:ro
      - ./logs:/app/logs
    networks:
      - quorum-net

  architect:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
      args:
        APP_NAME: agent
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    <<: *agent-security
    depends_on:
      mcp-server:
        condition: service_healthy
    environment:
      <<: *shared-env
      PORT: 3002
      AGENT_ROLE: architect
      AGENT_CALLBACK_URL: http://architect:3002
    volumes:
      - ${WORKSPACE_PATH:-.}:/mnt/quorum/workspace:rw
      - ./logs:/app/logs
    networks:
      - quorum-net

  teamlead:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
      args:
        APP_NAME: agent
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    <<: *agent-security
    depends_on:
      mcp-server:
        condition: service_healthy
    environment:
      <<: *shared-env
      PORT: 3002
      AGENT_ROLE: teamlead
      AGENT_CALLBACK_URL: http://teamlead:3002
    volumes:
      - ${WORKSPACE_PATH:-.}:/mnt/quorum/workspace:rw
      - ./logs:/app/logs
    networks:
      - quorum-net

  developer:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
      args:
        APP_NAME: agent
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    <<: *agent-security
    depends_on:
      mcp-server:
        condition: service_healthy
    environment:
      <<: *shared-env
      PORT: 3002
      AGENT_ROLE: developer
      AGENT_CALLBACK_URL: http://developer:3002
    volumes:
      - ${WORKSPACE_PATH:-.}:/mnt/quorum/workspace:rw
      - ./logs:/app/logs
    networks:
      - quorum-net

networks:
  quorum-net:
    driver: bridge