x-git-identity: &git-identity
  GIT_AUTHOR_NAME: Quorum Agent
  GIT_AUTHOR_EMAIL: quorum-agent@noreply.local
  GIT_COMMITTER_NAME: Quorum Agent
  GIT_COMMITTER_EMAIL: quorum-agent@noreply.local

x-shared-env: &shared-env
  <<: *git-identity
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
  ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-sonnet-4-5-20250929}
  ANTHROPIC_MAX_TOKENS: ${ANTHROPIC_MAX_TOKENS:-4096}
  MCP_SERVER_URL: http://mcp-server:3000
  MCP_REQUEST_TIMEOUT_MS: ${MCP_REQUEST_TIMEOUT_MS:-1800000}
  LOG_JSON_DIR: /app/logs
  LOG_LEVEL: ${LOG_LEVEL:-log}
  npm_config_cache: /tmp/.npm

x-base-security: &base-security
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  read_only: true
  tmpfs:
    - /tmp:size=512m,uid=${HOST_UID:-1000},gid=${HOST_GID:-1000}
    - /home/quorum/.config:size=64m,uid=${HOST_UID:-1000},gid=${HOST_GID:-1000}
    - /home/quorum/.local:size=64m,uid=${HOST_UID:-1000},gid=${HOST_GID:-1000}
    - /home/quorum/.cache:size=128m,uid=${HOST_UID:-1000},gid=${HOST_GID:-1000}

x-agent-security: &agent-security
  <<: *base-security
  tmpfs:
    - /tmp:size=512m,uid=${HOST_UID:-1000},gid=${HOST_GID:-1000}
    - /home/quorum/.claude:size=256m,uid=${HOST_UID:-1000},gid=${HOST_GID:-1000}
    - /home/quorum/.config:size=64m,uid=${HOST_UID:-1000},gid=${HOST_GID:-1000}
    - /home/quorum/.local:size=64m,uid=${HOST_UID:-1000},gid=${HOST_GID:-1000}
    - /home/quorum/.cache:size=128m,uid=${HOST_UID:-1000},gid=${HOST_GID:-1000}

services:
  ollama-init:
    image: ollama/ollama:latest
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 2 && ollama pull mxbai-embed-large && echo 'Model pull complete'"]
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - quorum-net

  ollama:
    image: ollama/ollama:latest
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    networks:
      - quorum-net

  opensearch:
    image: opensearchproject/opensearch:2
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - quorum-net

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: default
      args:
        APP_NAME: mcp-server
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    # QRM7-001 Layer 2: faster TCP keepalive for dead-peer detection on SSE sockets.
    # Detection time: 15s + (5s × 6) = 45s from idle to dead-peer detection.
    # These are namespaced sysctls — no extra capabilities needed.
    sysctls:
      net.ipv4.tcp_keepalive_time: 15
      net.ipv4.tcp_keepalive_intvl: 5
      net.ipv4.tcp_keepalive_probes: 6
    ports:
      - "3000:3000"
    environment:
      <<: *shared-env
      APP_NAME: mcp-server
      PORT: 3000
      LOG_LEVEL: debug
      ENABLE_TEST_ENDPOINTS: "true"
      MCP_WORKSPACE_DIR: /mnt/quorum/workspace
      # Bootstrap context injection (QRM4)
      BOOTSTRAP_ENABLED: ${BOOTSTRAP_ENABLED:-true}
      BOOTSTRAP_MAX_TOKENS: ${BOOTSTRAP_MAX_TOKENS:-1000}
      BOOTSTRAP_PROJECT_RATIO: ${BOOTSTRAP_PROJECT_RATIO:-0.6}
      # Context Store backend (QRM5-009)
      CONTEXT_STORE_BACKEND: opensearch
      # OpenSearch (QRM5)
      OPENSEARCH_NODE: http://opensearch:9200
      OPENSEARCH_INDEX: quorum-context
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: admin
      # Ollama embedding (QRM5)
      OLLAMA_BASE_URL: http://ollama:11434
      EMBEDDING_MODEL: mxbai-embed-large
      EMBEDDING_DIMENSIONS: "1024"
    depends_on:
      opensearch:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ${WORKSPACE_PATH:-.}:/mnt/quorum/workspace:rw
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - quorum-net

  moderator:
    build:
      context: .
      dockerfile: Dockerfile
      target: moderator
      args:
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    <<: *base-security
    stdin_open: true
    tty: true
    depends_on:
      mcp-server:
        condition: service_healthy
    environment:
      # QRM7-007: do NOT inherit *shared-env — that would re-introduce
      # ANTHROPIC_API_KEY, which CC CLI prefers over the OAuth credentials
      # written by `/login`, silently routing moderator turns to org metered
      # billing instead of the user's subscription seat. The other shared
      # vars (LOG_*, ANTHROPIC_MODEL/MAX_TOKENS, MCP_REQUEST_TIMEOUT_MS,
      # npm_config_cache) are NestJS-app concerns that CC CLI does not read.
      # *git-identity is merged in explicitly so any git command the
      # moderator spawns via Bash uses the Quorum Agent identity, matching
      # the agents.
      <<: *git-identity
      MCP_SERVER_URL: http://mcp-server:3000/mcp
    volumes:
      - ${WORKSPACE_PATH:-.}:/mnt/quorum/workspace:rw
      - ./logs:/app/logs
      - moderator-claude-data:/home/quorum/.claude
    networks:
      - quorum-net

  architect:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
      args:
        APP_NAME: agent
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    <<: *agent-security
    depends_on:
      mcp-server:
        condition: service_healthy
    environment:
      <<: *shared-env
      PORT: 3002
      AGENT_ROLE: architect
      AGENT_CALLBACK_URL: http://architect:3002
    volumes:
      - ${WORKSPACE_PATH:-.}:/mnt/quorum/workspace:rw
      - ./logs:/app/logs
    networks:
      - quorum-net

  teamlead:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
      args:
        APP_NAME: agent
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    <<: *agent-security
    depends_on:
      mcp-server:
        condition: service_healthy
    environment:
      <<: *shared-env
      PORT: 3002
      AGENT_ROLE: teamlead
      AGENT_CALLBACK_URL: http://teamlead:3002
    volumes:
      - ${WORKSPACE_PATH:-.}:/mnt/quorum/workspace:rw
      - ./logs:/app/logs
    networks:
      - quorum-net

  developer:
    build:
      context: .
      dockerfile: Dockerfile
      target: agent
      args:
        APP_NAME: agent
        HOST_UID: ${HOST_UID:-1000}
        HOST_GID: ${HOST_GID:-1000}
    <<: *agent-security
    depends_on:
      mcp-server:
        condition: service_healthy
    environment:
      <<: *shared-env
      PORT: 3002
      AGENT_ROLE: developer
      AGENT_CALLBACK_URL: http://developer:3002
    volumes:
      - ${WORKSPACE_PATH:-.}:/mnt/quorum/workspace:rw
      - ./logs:/app/logs
    networks:
      - quorum-net

volumes:
  ollama-data:
  opensearch-data:
  moderator-claude-data:

networks:
  quorum-net:
    driver: bridge